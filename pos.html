<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飯丸屋 POS v15.0 邏輯全回歸版</title>
<style>
/* 完全復原原始 CSS 與動畫 */
body{ margin:0; font-family:"Microsoft JhengHei",sans-serif; background:#111; color:#fff; overflow:hidden;}
.wrap{ display:flex; height:100vh; }
.sidebar{ width:300px; background:#1b1b1b; padding:20px; box-sizing:border-box; border-right:1px solid #333; display:flex; flex-direction:column; overflow-y:auto; }
.main{ flex:1; padding:20px; box-sizing:border-box; overflow-y:auto; background:#111; }
.btn{ width:100%; border:none; padding:14px; margin-bottom:10px; border-radius:12px; cursor:pointer; font-size:16px; font-weight:800; transition:.2s; }
.btn-usb{ background:#f1f1f1; color:#111; }
.btn-info{ background:#3498db; color:#fff; }
.btn-order{ background:#f39c12; color:#111; }
.btn-start{ background:#2ecc71; color:#111; }
.btn-shift{ background:#e74c3c; color:#fff; }

/* 班次顯示 */
.shift-box{ margin-top:14px; background:#242424; border:1px solid #333; border-radius:14px; padding:12px; font-size:14px; line-height:1.6; }
.shift-active{ color:#7CFC98; }
.shift-inactive{ color:#ff8c8c; }

/* 點餐面板 */
.cash-panel{ display:none; background:#1f1f1f; border-radius:16px; padding:20px; border:1px solid #333; margin-bottom:20px; }
.cash-panel.show{ display:block; }
.section-title { font-size:18px; font-weight:bold; color:#f39c12; margin:15px 0 10px; border-left:4px solid #f39c12; padding-left:10px; }
.cash-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(130px, 1fr)); gap:10px; }
.cash-item{ background:#2b2b2b; border-radius:12px; padding:12px; border:1px solid #3a3a3a; cursor:pointer; text-align:center; }
.cash-item.active{ border-color:#f39c12; background:#333; }
.step-lock{ opacity:.3; pointer-events:none; }

/* 購物車 */
.basket-box{ background:#2b2b2b; border:2px solid #f39c12; border-radius:16px; padding:16px; margin-top:20px; }
.basket-item{ display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #444; font-size:14px; }

/* 卡片與移除動畫 */
.grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:15px; }
.card{ background:#2b2b2b; border-radius:16px; padding:16px; border-left:6px solid #f39c12; transition: opacity .18s ease, transform .18s ease; position:relative; }
.card.removing { opacity: 0; transform: scale(0.95); }
.card-onsite{ border-left-color:#f39c12; }
.card-reserve{ border-left-color:#6c63ff; background:linear-gradient(180deg,#2a2d3c 0%, #262837 100%); }
.seq{ font-size:30px; font-weight:900; color:#f39c12; }
.card-reserve .seq{ color:#9c8cff; }
.meta{ margin-top:8px; color:#ccc; font-size:13px; }
.content{ font-size:22px; line-height:1.6; white-space:pre-line; color:#ffd166; margin:12px 0; }
.actions{ display:flex; gap:8px; margin-top:auto; padding-top:15px; flex-wrap:wrap; }
.sbtn{ flex:1; min-width:80px; border:none; padding:10px; border-radius:10px; cursor:pointer; font-size:13px; font-weight:bold; color:#fff; }
.sbtn:disabled{ opacity:0.4; cursor:not-allowed; }
.reprint{ background:#3498db; }
.notify{ background:#9b59b6; }
.done{ background:#2ecc71; }
.cancel{ background:#e74c3c; }
</style>
</head>
<body>

<div class="wrap">
  <div class="sidebar">
    <h1>🍙 飯丸屋 POS</h1>
    <button class="btn btn-usb" onclick="connectUSB()">🔌 建立 USB 連線</button>
    <button class="btn btn-info" onclick="fetchOrders()">🔄 重新整理訂單</button>
    <button class="btn btn-order" onclick="toggleCashPanel()">🛒 現場代客下單</button>
    <button class="btn btn-start" onclick="handleStartShift()">🟢 開班</button>
    <button class="btn btn-shift" onclick="handleCloseShift()">🧾 結單 / 交班</button>

    <div id="usbStatus" class="usb-status">🔌 尚未連線</div>
    <div class="shift-box">
      <div id="shiftStatus" class="shift-inactive">目前尚未開班</div>
      <div id="shiftSummaryMini" style="margin-top:10px; color:#ccc; font-size:13px;"></div>
    </div>
    <div id="msg" class="msg"></div>
  </div>

  <div class="main">
    <div id="cashPanel" class="cash-panel">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="margin:0;">現場點餐系統</h2>
        <div style="background:#333; padding:5px; border-radius:10px;">
          <button id="mBtnCombo" onclick="setCashMode('combo')" style="padding:6px 12px; background:#f39c12; color:#111; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">套餐流程</button>
          <button id="mBtnSingle" onclick="setCashMode('single')" style="padding:6px 12px; background:#444; color:#fff; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">單點模式</button>
        </div>
      </div>

      <div id="cashComboWrap">
        <div class="section-title">1. 主餐選擇</div>
        <div id="posMainGrid" class="cash-grid"></div>
        <div id="posAddonStep" class="step-lock"><div class="section-title">加料複選</div><div id="posAddonGrid" class="cash-grid"></div></div>
        <div id="posDrinkStep" class="step-lock"><div class="section-title">2. 套餐飲品</div><div id="posDrinkGrid" class="cash-grid"></div></div>
        <div id="posSideStep" class="step-lock"><div class="section-title">3. 套餐副餐</div><div id="posSideGrid" class="cash-grid"></div></div>
      </div>

      <div id="cashSingleWrap" style="display:none;">
        <div class="section-title">主食單點</div><div id="posSMainGrid" class="cash-grid"></div>
        <div class="section-title">飲品單點</div><div id="posSDrinkGrid" class="cash-grid"></div>
        <div class="section-title">副餐單點</div><div id="posSSideGrid" class="cash-grid"></div>
      </div>

      <div class="basket-box">
        <div style="font-weight:bold; display:flex; justify-content:space-between;">
            <span>🛒 點餐內容清單</span>
            <span style="color:#2ecc71;">總金額: $<span id="posTotal">0</span></span>
        </div>
        <div id="posBasketList" style="min-height:30px; color:#aaa; font-size:14px; margin-top:10px;">尚未加入項目</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:15px;">
          <button class="btn" style="background:#555; color:#fff;" onclick="addToPosBasket()">＋加入清單</button>
          <button id="posSubmitBtn" class="btn btn-order" onclick="submitPosOrder()" disabled>確認送出現場單</button>
        </div>
      </div>
    </div>

    <h2>即時訂單看板</h2>
    <div id="orders" class="grid"></div>
  </div>
</div>

<script>
const GAS_API = "https://script.google.com/macros/s/AKfycbz0HQ7EsRj1kFhP-UT9DIn90WgXt7q-H8vkEh3fD79_4BuCm5HnCFGF9q3h1mf6pY4s/exec";

/* 嚴格 A-P 資料 */
const MAINS = [{code:"A",n:"沖繩經典",cp:107,sp:63},{code:"B",n:"炙燒明太子",cp:117,sp:73},{code:"C",n:"雙層起司",cp:123,sp:79},{code:"D",n:"松露炒菇",cp:133,sp:89},{code:"E",n:"煙燻雞肉",cp:133,sp:89},{code:"F",n:"日式炸雞",cp:137,sp:93},{code:"G",n:"咖哩可樂餅",cp:137,sp:93},{code:"H",n:"明太子干貝酥",cp:137,sp:93},{code:"I",n:"炸蝦天婦羅",cp:147,sp:103},{code:"J",n:"炸魚塔塔醬",cp:147,sp:103},{code:"K",n:"泡菜燒肉",cp:147,sp:103},{code:"L",n:"卡拉雞",cp:153,sp:109},{code:"M",n:"日式豬排",cp:157,sp:113},{code:"O",n:"蒜味蝦蝦飯",cp:213,sp:169},{code:"P",n:"奶油蝦蝦飯",cp:223,sp:179}];
const DRINKS = [{n:"原味紅茶",e:0,p:30},{n:"無糖豆漿",e:0,p:35},{n:"黑糖豆漿",e:0,p:35},{n:"紅茶豆漿",e:0,p:35},{n:"蜂蜜檸檬",e:0,p:35},{n:"黑芝麻豆漿",e:5,p:40},{n:"日式奶茶",e:5,p:40}];
const SIDES = [{n:"咖哩可樂餅",e:0,p:35},{n:"海苔薯條",e:0,p:43},{n:"蜂蜜芥末薯條",e:0,p:43},{n:"酥炸菇",e:0,p:43},{n:"酥炸蝦頭",e:0,p:43},{n:"洋蔥圈",e:6,p:49},{n:"黃金雞塊",e:6,p:49},{n:"日式炸雞",e:16,p:59},{n:"炸魚薯條",e:26,p:69}];
const ADDONS = [{n:"換素餐肉",p:10},{n:"加起司",p:10},{n:"加玉子燒",p:15},{n:"加炸蝦",p:35}];

/* 復原互斥鎖與快取機制 */
let isFetching = false;
let printedOrders = new Set();
let printingOrders = new Set();
let posBasket = [], curSel = { main:null, drink:null, side:null, addons:[] }, singleSel = {};
let printerDevice = null, endpointOut = null, currentShift = null;

/* 蜂鳴聲 */
function playBeep(){
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 880; gain.gain.value = 0.1;
        osc.start(); osc.stop(ctx.currentTime + 0.15);
    } catch(e){}
}

/* 復原預約單出單時間判斷 */
function shouldPrintNow(order) {
    const raw = String(order.rawPickup || order.pickup || "").trim();
    if (!raw || raw === "現場取餐" || raw.includes("現場取餐")) return true;
    const m = raw.match(/^(\d{4})-(\d{2})-(\d{2}) (\d{2}):(\d{2})$/);
    if (!m) return false;
    const pickupDate = new Date(m[1], m[2]-1, m[3], m[4], m[5]);
    return Date.now() >= new Date(pickupDate.getTime() - 15 * 60 * 1000).getTime();
}

/* USB 連線 */
async function connectUSB(){
    try {
        printerDevice = await navigator.usb.requestDevice({ filters:[] });
        await printerDevice.open();
        await printerDevice.selectConfiguration(1);
        const iface = printerDevice.configuration.interfaces[0];
        await printerDevice.claimInterface(iface.interfaceNumber);
        endpointOut = iface.alternates[0].endpoints.find(e => e.direction === 'out').endpointNumber;
        document.getElementById("usbStatus").innerText = "🔌 USB 已連線: " + printerDevice.productName;
    } catch(err) { alert("連線失敗: " + err); }
}

/* 復原精確 Canvas 樣式與動態高度 */
async function printOrder(o) {
    if(!printerDevice || !endpointOut) return;
    const items = String(o.content || "").split(" | ");
    const width = 384; 
    const totalHeight = 220 + (items.length * 40) + 160;

    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    canvas.width = width; canvas.height = totalHeight;
    ctx.fillStyle = "#fff"; ctx.fillRect(0,0,width,totalHeight);
    ctx.fillStyle = "#000"; ctx.textBaseline = "top";
    
    let y = 20;
    ctx.font = "bold 38px Arial"; ctx.fillText("飯丸屋 - 訂單明細", 10, y); y += 60;
    ctx.font = "bold 65px Arial"; ctx.fillText(o.seq, 10, y); y += 75;
    ctx.font = "24px Arial";
    ctx.fillText("取餐：" + (o.pickup || "現場取餐"), 10, y); y += 40;
    ctx.fillText("付款：" + o.pay, 10, y); y += 40;
    ctx.fillText("---------------------------", 10, y); y += 35;
    
    ctx.font = "bold 26px Arial";
    items.forEach(line => { ctx.fillText("・" + line, 10, y); y += 40; });
    
    ctx.fillText("---------------------------", 10, y); y += 40;
    ctx.font = "bold 45px Arial"; ctx.fillText("總計 $" + o.total, 10, y); y += 65;
    
    await doPrint(canvas);
}

async function doPrint(canvas) {
    const ctx = canvas.getContext("2d");
    const imgData = ctx.getImageData(0,0,canvas.width,canvas.height).data;
    const widthBytes = canvas.width / 8;
    const bitmap = new Uint8Array(widthBytes * canvas.height);
    for(let i=0; i<imgData.length; i+=4) {
        if((imgData[i]+imgData[i+1]+imgData[i+2])/3 < 128) {
            const idx = i/4;
            bitmap[Math.floor(idx/canvas.width) * widthBytes + Math.floor((idx%canvas.width)/8)] |= (1 << (7 - ((idx%canvas.width)%8)));
        }
    }
    const mmH = Math.ceil(canvas.height / 8);
    const header = new TextEncoder().encode(`SIZE 48 mm, ${mmH} mm\r\nGAP 0,0\r\nCLS\r\nBITMAP 0,0,${widthBytes},${canvas.height},0,`);
    const footer = new TextEncoder().encode("\r\nPRINT 1,1\r\nFEED 20\r\n");
    const data = new Uint8Array(header.length + bitmap.length + footer.length);
    data.set(header); data.set(bitmap, header.length); data.set(footer, header.length + bitmap.length);
    await printerDevice.transferOut(endpointOut, data);
}

/* 抓單與自動列印 */
async function fetchOrders() {
    if(isFetching) return;
    isFetching = true;
    try {
        const res = await fetch(GAS_API + "?action=getOrders&t=" + Date.now());
        const list = await res.json();
        renderOrders(list);
        
        list.forEach(o => {
            if (o.status === "待列印" && !printedOrders.has(o.id) && !printingOrders.has(o.id) && shouldPrintNow(o)) {
                printingOrders.add(o.id);
                printOrder(o).then(() => {
                    printedOrders.add(o.id);
                    updateStatus(o.row, "製作中");
                    playBeep();
                }).finally(() => printingOrders.delete(o.id));
            }
        });
    } catch(e){} finally { isFetching = false; }
}

function renderOrders(list) {
    document.getElementById("orders").innerHTML = list.map(o => {
        const isReserve = o.pickup && o.pickup !== "現場取餐";
        const isPending = o.status === "待付款";
        return `
            <div class="card ${isReserve ? 'card-reserve' : 'card-onsite'}" id="order-${o.row}">
                <div class="seq">${o.seq}</div>
                <div class="meta">${o.status} | ${o.pay}</div>
                <div class="meta">取餐: ${o.pickup}</div>
                ${isReserve ? '<div class="reserve-badge">預約單</div>' : ''}
                <div class="content">${o.content.split(' | ').join('\n')}</div>
                <div style="font-size:24px; font-weight:bold;">$${o.total}</div>
                <div class="actions">
                    <button class="sbtn reprint" onclick='manualPrint("${encodeURIComponent(JSON.stringify(o))}")' ${isPending ? 'disabled' : ''}>補印</button>
                    <button class="sbtn notify" onclick="updateStatus(${o.row}, '可取餐', this)" ${isPending ? 'disabled' : ''}>通知</button>
                    <button class="sbtn done" onclick="fastDone(${o.row}, this)" ${isPending ? 'disabled' : ''}>完成</button>
                    <button class="sbtn cancel" onclick="updateStatus(${o.row}, '已作廢', this)">作廢</button>
                </div>
            </div>
        `;
    }).join("");
}

/* 復原移除動畫機制 */
async function fastDone(row, btn) {
    const card = document.getElementById(`order-${row}`);
    if(card) card.classList.add("removing");
    setTimeout(async () => {
        await updateStatus(row, '已完成');
    }, 180);
}

async function manualPrint(enc) { await printOrder(JSON.parse(decodeURIComponent(enc))); }
async function updateStatus(row, s, btn) {
    if(btn) btn.disabled = true;
    await fetch(GAS_API + `?action=updateStatus&row=${row}&status=${encodeURIComponent(s)}`);
    fetchOrders();
}

/* 購物車邏輯 */
function toggleCashPanel() { document.getElementById("cashPanel").classList.toggle("show"); }
function setCashMode(m) {
    cashMode = m;
    document.getElementById("cashComboWrap").style.display = m==='combo'?'block':'none';
    document.getElementById("cashSingleWrap").style.display = m==='single'?'block':'none';
    document.getElementById("mBtnCombo").style.background = m==='combo'?'#f39c12':'#444';
    document.getElementById("mBtnSingle").style.background = m==='single'?'#f39c12':'#444';
}
function renderComboUI() {
    document.getElementById("posMainGrid").innerHTML = MAINS.map(m=>`<div class="cash-item ${curSel.main?.code===m.code?'active':''}" onclick="selMain('${m.code}')"><b>${m.code}.${m.n}</b><span>$${m.cp}</span></div>`).join("");
    document.getElementById("posAddonGrid").innerHTML = ADDONS.map(a=>`<div class="cash-item ${curSel.addons.some(x=>x.n===a.n)?'active':''}" onclick="toggleAddon('${a.n}')"><b>${a.n}</b><span>+$${a.p}</span></div>`).join("");
    document.getElementById("posDrinkGrid").innerHTML = DRINKS.map(d=>`<div class="cash-item ${curSel.drink?.n===d.n?'active':''}" onclick="selDrink('${d.n}')"><b>${d.n}</b><span>+$${d.e}</span></div>`).join("");
    document.getElementById("posSideGrid").innerHTML = SIDES.map(s=>`<div class="cash-item ${curSel.side?.n===s.n?'active':''}" onclick="selSide('${s.n}')"><b>${s.n}</b><span>+$${s.e}</span></div>`).join("");
}
function selMain(c) { curSel.main=MAINS.find(x=>x.code===c); ["posAddonStep","posDrinkStep"].forEach(id=>document.getElementById(id).classList.remove("step-lock")); renderComboUI(); }
function toggleAddon(n) { const a=ADDONS.find(x=>x.n===n); const i=curSel.addons.findIndex(x=>x.n===n); if(i>-1)curSel.addons.splice(i,1); else curSel.addons.push(a); renderComboUI(); }
function selDrink(n) { curSel.drink=DRINKS.find(x=>x.n===n); document.getElementById("posSideStep").classList.remove("step-lock"); renderComboUI(); }
function selSide(n) { curSel.side=SIDES.find(x=>x.n===n); renderComboUI(); }

function renderSingleUI() {
    const r = (items, id) => {
        document.getElementById(id).innerHTML = items.map(i=>`<div class="cash-item"><b>${i.n}</b><span>$${i.p||i.sp}</span><div style="margin-top:8px; display:flex; justify-content:space-between; align-items:center;"><button onclick="editSingle('${i.n}',-1,${i.p||i.sp})">-</button><span id="q-${i.n}">${singleSel[i.n]?.q||0}</span><button onclick="editSingle('${i.n}',1,${i.p||i.sp})">+</button></div></div>`).join("");
    };
    render(MAINS, "posSMainGrid"); render(DRINKS, "posSDrinkGrid"); render(SIDES, "posSSideGrid");
}
function render(items, id) {
    document.getElementById(id).innerHTML = items.map(i=>`<div class="cash-item"><b>${i.n}</b><span>$${i.p||i.sp}</span><div style="margin-top:8px; display:flex; justify-content:space-between; align-items:center;"><button onclick="editSingle('${i.n}',-1,${i.p||i.sp})">-</button><span id="q-${i.n}">${singleSel[i.n]?.q||0}</span><button onclick="editSingle('${i.n}',1,${i.p||i.sp})">+</button></div></div>`).join("");
}
function editSingle(n, d, p) { if(!singleSel[n])singleSel[n]={q:0,p:p}; singleSel[n].q+=d; if(singleSel[n].q<=0)delete singleSel[n]; document.getElementById(`q-${n}`).innerText=singleSel[n]?.q||0; }

function addToPosBasket() {
    if(cashMode==='combo') {
        if(!curSel.main||!curSel.drink||!curSel.side) return alert("未選完");
        const price = curSel.main.cp + curSel.drink.e + curSel.side.e + curSel.addons.reduce((s,a)=>s+a.p,0);
        posBasket.push({ desc: `${curSel.main.n}(${curSel.drink.n}/${curSel.side.n}${curSel.addons.length?',加:'+curSel.addons.map(a=>a.n).join('|'):''})`, price });
        curSel={main:null,drink:null,side:null,addons:[]}; renderComboUI();
    } else {
        Object.keys(singleSel).forEach(k=>posBasket.push({desc:`${k} x ${singleSel[k].q}`, price:singleSel[k].p*singleSel[k].q}));
        singleSel={}; renderSingleUI();
    }
    renderBasketList();
}
function renderBasketList() {
    const list = document.getElementById("posBasketList"); let total = 0;
    list.innerHTML = posBasket.length ? posBasket.map((item, i) => { total += item.price; return `<div class="basket-item"><span>${item.desc}</span><span>$${item.price}<b style="color:red;cursor:pointer;margin-left:10px;" onclick="posBasket.splice(${i},1);renderBasketList();">✕</b></span></div>`; }).join("") : "尚未加入項目";
    document.getElementById("posTotal").innerText = total; document.getElementById("posSubmitBtn").disabled = !posBasket.length;
}

/* 班次作業 */
async function fetchShift() {
    const res = await fetch(GAS_API + "?action=getCurrentShift&t=" + Date.now());
    currentShift = await res.json();
    const div = document.getElementById("shiftStatus");
    const mini = document.getElementById("shiftSummaryMini");
    if(currentShift.active){
        div.className = "shift-active"; div.innerHTML = `已開班: ${currentShift.shiftName}`;
        const sumRes = await fetch(GAS_API + "?action=getShiftSummary&t=" + Date.now());
        const s = await sumRes.json();
        mini.innerHTML = `訂單數: ${s.totalOrders} | 總額: $${s.grandTotal}<br>現金: $${s.cashTotal}`;
    } else {
        div.className = "shift-inactive"; div.innerHTML = "尚未開班"; mini.innerHTML = "";
    }
}
async function handleStartShift() {
    const op = prompt("人員?"); if(!op) return;
    await fetch(GAS_API + `?action=startShift&operator=${encodeURIComponent(op)}&shiftName=現場班`);
    fetchShift();
}
async function handleCloseShift() {
    if(!confirm("確認交班結單?")) return;
    await fetch(GAS_API + "?action=closeShift");
    fetchShift(); printedOrders.clear();
}
async function submitPosOrder() {
    if(!currentShift?.active) return alert("請先開班！");
    const orderData = { items: posBasket.map(i=>i.desc).join(" | "), total: posBasket.reduce((s,i)=>s+i.price, 0), pickupTime: "現場取餐", payMethod: "現金", customerName: "現場代點" };
    await fetch(GAS_API + "?action=submitOrder&orderData=" + JSON.stringify(orderData));
    posBasket = []; renderBasketList(); fetchOrders(); playBeep();
}

setInterval(fetchOrders, 10000);
setInterval(fetchShift, 30000);
renderComboUI(); renderSingleUI(); fetchShift(); fetchOrders();
</script>
