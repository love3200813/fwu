<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飯丸屋 POS 購物車版</title>

<style>
body{
  margin:0;
  font-family:"Microsoft JhengHei",sans-serif;
  background:#111;
  color:#fff;
}

.wrap{
  display:flex;
  min-height:100vh;
}

.main{
  flex:1;
  padding:20px;
}

/* ===== 菜單 ===== */
.menu button{
  display:block;
  width:200px;
  margin-bottom:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#3498db;
  color:#fff;
  font-weight:900;
  cursor:pointer;
}

/* ===== 購物車 ===== */
.cart-box{
  width:320px;
  background:#1b1b1b;
  padding:20px;
}

.cart-title{
  font-size:20px;
  font-weight:900;
  margin-bottom:10px;
}

.cart-item{
  background:#2b2b2b;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.cart-name{
  font-weight:900;
}

.cart-detail{
  font-size:12px;
  color:#aaa;
}

.cart-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:5px;
}

.qty-btn{
  width:26px;
  height:26px;
  border:none;
  background:#444;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}

.cart-total{
  font-size:22px;
  font-weight:900;
  margin-top:10px;
  color:#2ecc71;
}

.cart-actions{
  margin-top:10px;
}

.cart-actions button{
  width:100%;
  padding:12px;
  margin-top:6px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:900;
}

.btn-clear{background:#555;color:#fff;}
.btn-send{background:#e67e22;color:#fff;}
</style>
</head>

<body>

<div class="wrap">

  <!-- ===== 左邊菜單 ===== -->
  <div class="main">

    <h2>🍱 套餐</h2>

    <div class="menu">
      <button onclick="addCombo('沖繩經典',100)">沖繩經典套餐 $100</button>
      <button onclick="addCombo('炙燒明太子',120)">炙燒明太子套餐 $120</button>
    </div>

    <h2>🍙 單點</h2>

    <div class="menu">
      <button onclick="addSingleToCart('沖繩經典',63)">沖繩經典 $63</button>
      <button onclick="addSingleToCart('薯條',35)">薯條 $35</button>
    </div>

  </div>

  <!-- ===== 右邊購物車 ===== -->
  <div class="cart-box">

    <div class="cart-title">🛒 購物車</div>

    <div id="cartList">尚未選擇餐點</div>

    <div class="cart-total">
      $<span id="cartTotal">0</span>
    </div>

    <div class="cart-actions">
      <button class="btn-clear" onclick="clearCart()">清空</button>
      <button class="btn-send" onclick="submitOrder()">送出訂單</button>
    </div>

  </div>

</div>

<script>

/* ===== 購物車 ===== */
let cartItems = [];

/* ===== 套餐（簡化版）===== */
function addCombo(name, price){

  cartItems.push({
    name: name + "套餐",
    detail: "飲料:紅茶 / 副餐:薯條",
    price: price,
    qty:1
  });

  updateCartUI();
}

/* ===== 單點 ===== */
function addSingleToCart(name, price){

  const exist = cartItems.find(x=>x.name===name);

  if(exist){
    exist.qty++;
  }else{
    cartItems.push({
      name,
      detail:"",
      price,
      qty:1
    });
  }

  updateCartUI();
}

/* ===== 更新畫面 ===== */
function updateCartUI(){

  const list = document.getElementById("cartList");
  const totalDiv = document.getElementById("cartTotal");

  if(cartItems.length === 0){
    list.innerHTML = "尚未選擇餐點";
    totalDiv.innerText = 0;
    return;
  }

  list.innerHTML = cartItems.map((item,i)=>`
    <div class="cart-item">
      <div class="cart-name">${item.name}</div>
      <div class="cart-detail">${item.detail}</div>

      <div class="cart-row">
        <div>$${item.price}</div>

        <div>
          <button class="qty-btn" onclick="changeQty(${i},-1)">-</button>
          ${item.qty}
          <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
          <button class="qty-btn" onclick="removeItem(${i})">✕</button>
        </div>
      </div>
    </div>
  `).join("");

  totalDiv.innerText = getTotal();
}

/* ===== 數量 ===== */
function changeQty(index, delta){
  cartItems[index].qty += delta;

  if(cartItems[index].qty <= 0){
    cartItems.splice(index,1);
  }

  updateCartUI();
}

/* ===== 刪除 ===== */
function removeItem(index){
  cartItems.splice(index,1);
  updateCartUI();
}

/* ===== 清空 ===== */
function clearCart(){
  cartItems = [];
  updateCartUI();
}

/* ===== 總金額 ===== */
function getTotal(){
  return cartItems.reduce((sum,item)=>{
    return sum + item.price * item.qty;
  },0);
}

/* ===== 送單（目前console測試）===== */
function submitOrder(){

  if(cartItems.length === 0){
    alert("請先選擇餐點");
    return;
  }

  const result = cartItems.map(item=>{
    return `${item.name} x${item.qty}`;
  }).join("\n");

  alert("送單成功\n\n" + result);

  console.log(cartItems);

  clearCart();
}

</script>

</body>
</html>
