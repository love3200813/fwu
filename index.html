<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飯丸屋點餐系統 v13.0.0 多筆購物車版</title>
<style>
:root{
  --bg:#f5f5f2; --panel:#ffffff; --line:#e7e7e7; --text:#1b1b1b;
  --muted:#7a7a7a; --primary:#111111; --success:#1f8f55; --danger:#d9534f;
  --warning:#d98b00; --info:#2563eb; --shadow:0 10px 24px rgba(0,0,0,.06); --radius:18px;
}
*{box-sizing:border-box;}
html,body{ margin:0; padding:0; font-family:"Microsoft JhengHei",sans-serif; background:var(--bg); color:var(--text); }
.page{ display:none; max-width:1100px; margin:0 auto; min-height:100vh; padding:18px 16px 40px; }
.active{ display:block; }
.topbar{ position:sticky; top:0; z-index:100; background:rgba(245,245,242,.92); backdrop-filter:blur(10px); padding-bottom:12px; }
.topbar-inner{ display:flex; justify-content:space-between; align-items:center; background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:14px 16px; box-shadow:var(--shadow); }
.brand-title{ font-size:26px; font-weight:900; }
.top-chip{ background:#f3f3f3; border-radius:999px; padding:8px 12px; font-size:13px; color:#555; }
.btn{ border:none; border-radius:14px; padding:14px 16px; font-size:16px; font-weight:900; cursor:pointer; transition:.18s; }
.btn-primary{ background:var(--primary); color:#fff; }
.btn-secondary{ background:#f1f1f1; color:#222; }
.btn-block{ width:100%; }
.mode-switch{ display:flex; gap:12px; margin:18px 0 16px; }
.mode-btn{ flex:1; border:none; border-radius:16px; padding:15px; background:#ececec; font-weight:900; cursor:pointer; }
.mode-btn.active{ background:#111; color:#fff; }
.combo-step{ background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:18px; box-shadow:var(--shadow); margin-bottom:16px; }
.step-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:12px; }
.menu-card{ background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:18px; cursor:pointer; transition:.18s; }
.menu-card.active{ border-color:#111; background:#f9f9f9; box-shadow: inset 0 0 0 1px #111; }
.step-lock{ opacity:.4; pointer-events:none; }
.step-chip{ border-radius:999px; padding:7px 12px; font-size:13px; font-weight:900; background:#f2f2f2; color:#555; }
.step-chip.ok{ background:#ecfdf3; color:#15803d; }
.cart-item-box { background: #fff; border: 1px solid var(--line); border-radius: 12px; padding: 12px; margin-bottom: 10px; position: relative; border-left: 5px solid #111; }
.del-btn { position: absolute; top: 10px; right: 10px; color: var(--danger); cursor: pointer; font-weight: bold; }
.inline-summary{ margin-top:18px; background:#fff; border:2px solid var(--primary); border-radius:20px; padding:18px; box-shadow:var(--shadow); }
.modal{ position:fixed; inset:0; background:rgba(0,0,0,.35); display:none; align-items:center; justify-content:center; z-index:200; padding:16px; }
.modal.show{ display:flex; }
.modal-card{ width:min(100%,520px); background:#fff; border-radius:18px; padding:20px; }
.toast{ position:fixed; left:50%; top:20px; transform:translateX(-50%); background:#111; color:#fff; padding:12px 16px; border-radius:14px; z-index:500; display:none; }
input, select { width:100%; border:1px solid var(--line); border-radius:14px; padding:14px; font-size:16px; margin-bottom:10px; }
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<div id="orderPage" class="page active">
  <div class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="brand-title">🍙 飯丸屋沖繩飯糰</div>
        <div style="font-size:13px; color:var(--muted);">加入購物車後可點下一份，最後統一結帳</div>
      </div>
      <div class="top-actions">
        <div class="top-chip">目前總計｜$<b id="cartTotalTop">0</b></div>
        <button class="btn btn-secondary" onclick="openQueryModal()">查詢訂單</button>
      </div>
    </div>
  </div>

  <div class="mode-switch">
    <button id="modeComboBtn" class="mode-btn active" onclick="setOrderMode('combo')">套餐模式</button>
    <button id="modeSingleBtn" class="mode-btn" onclick="setOrderMode('single')">單點模式</button>
  </div>

  <div id="comboModeWrap">
    <div class="combo-step">
      <div class="step-head">
        <div class="brand-title" style="font-size:20px;">1. 選擇主餐</div>
        <span id="stepMainChip" class="step-chip">進行中</span>
      </div>
      <div id="mainGrid" class="grid"></div>
    </div>

    <div id="addonStep" class="combo-step step-lock">
      <div class="brand-title" style="font-size:20px; margin-bottom:10px;">主餐加料</div>
      <div id="addonGrid" class="grid" style="grid-template-columns:repeat(auto-fit,minmax(140px,1fr));"></div>
    </div>

    <div id="drinkStep" class="combo-step step-lock">
      <div class="step-head">
        <div class="brand-title" style="font-size:20px;">2. 選擇飲料</div>
        <span id="stepDrinkChip" class="step-chip">未開始</span>
      </div>
      <div id="drinkGrid" class="grid"></div>
    </div>

    <div id="sideStep" class="combo-step step-lock">
      <div class="step-head">
        <div class="brand-title" style="font-size:20px;">3. 選擇副餐</div>
        <span id="stepSideChip" class="step-chip">未開始</span>
      </div>
      <div id="sideGrid" class="grid"></div>
    </div>
  </div>

  <div id="singleModeWrap" style="display:none;">
    <div id="singleMenuWrap"></div>
  </div>

  <div class="inline-summary">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
      <div class="brand-title" style="font-size:22px;">🛒 我的購物車</div>
      <div style="font-size:24px; font-weight:900;">$<span id="inlineSummaryTotal">0</span></div>
    </div>
    <div id="basketItemsList" style="margin-bottom:15px; color:#555;">尚未加入餐點</div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
      <button class="btn btn-secondary" onclick="addToBasket()">＋加入購物車</button>
      <button id="goCheckoutBtn" class="btn btn-primary" onclick="showCheckout()" disabled>確認結帳</button>
    </div>
  </div>

  <div id="checkoutPanel" class="combo-step" style="display:none; margin-top:20px; background:#fdfdfd; border:2px solid var(--info);">
    <h2 class="brand-title" style="margin-bottom:15px;">步驟 2：確認資料</h2>
    <div id="checkoutItemsDisplay" style="margin-bottom:15px; background:#fff; padding:12px; border-radius:12px; border:1px solid var(--line);"></div>
    
    <label style="font-weight:900;">取餐方式</label>
    <select id="pickupMode" onchange="handlePickupModeChange()">
      <option value="onsite">現場取餐（盡快）</option>
      <option value="reserve">預約取餐</option>
    </select>

    <div id="reserveFields" style="display:none;">
      <label style="font-weight:900;">預約日期</label>
      <select id="pickupDate" onchange="updatePickupTimeOptions()"></select>
      <label style="font-weight:900;">預約時間</label>
      <select id="pickupTime"></select>
    </div>

    <label style="font-weight:900;">付款方式</label>
    <select id="payMethod">
      <option value="LINEPAY">LINE Pay</option>
      <option value="現金">現場付款</option>
    </select>

    <label style="font-weight:900;">聯絡姓名</label>
    <input type="text" id="customerName" placeholder="請輸入姓名">
    <label style="font-weight:900;">聯絡電話</label>
    <input type="tel" id="customerPhone" placeholder="請輸入電話">

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:15px;">
      <button class="btn btn-secondary" onclick="hideCheckout()">返回點餐</button>
      <button id="submitBtn" class="btn btn-primary" onclick="submitOrder()">確認送出訂單</button>
    </div>
  </div>
</div>

<div id="successPage" class="page">
    <div class="combo-step" style="text-align:center;">
        <h2 class="brand-title">✅ 訂單成立</h2>
        <div id="successDetail" style="margin:20px 0; line-height:2; font-size:18px;"></div>
        <button class="btn btn-primary" onclick="location.reload()">再點一筆</button>
    </div>
</div>

<div id="queryModal" class="modal">
  <div class="modal-card">
    <div class="step-head">
      <div class="brand-title">查詢訂單</div>
      <button class="btn" style="padding:5px 10px;" onclick="closeQueryModal()">✕</button>
    </div>
    <input type="text" id="queryInput" placeholder="輸入訂單ID或取餐號">
    <button class="btn btn-primary btn-block" onclick="queryOrder()">送出查詢</button>
    <div id="queryResult" style="margin-top:15px;"></div>
  </div>
</div>

<script>
const GAS_API = "https://script.google.com/macros/s/AKfycbz0HQ7EsRj1kFhP-UT9DIn90WgXt7q-H8vkEh3fD79_4BuCm5HnCFGF9q3h1mf6pY4s/exec";
const BUSINESS_OPEN = { h:10, m:30 };
const BUSINESS_CLOSE = { h:19, m:0 };
const MIN_RESERVE_MINUTES = 60;

/* --- 完整資料集 --- */
const COMBO_MAINS = [
  { code:"A", n:"沖繩經典", comboPrice:107, singlePrice:63 },
  { code:"B", n:"炙燒明太子", comboPrice:117, singlePrice:73 },
  { code:"C", n:"雙層起司", comboPrice:123, singlePrice:79 },
  { code:"D", n:"松露炒菇", comboPrice:133, singlePrice:89 },
  { code:"E", n:"煙燻雞肉", comboPrice:133, singlePrice:89 },
  { code:"F", n:"日式炸雞", comboPrice:137, singlePrice:93 },
  { code:"G", n:"咖哩可樂餅", comboPrice:137, singlePrice:93 },
  { code:"H", n:"明太子干貝酥", comboPrice:137, singlePrice:93 },
  { code:"I", n:"炸蝦天婦羅", comboPrice:147, singlePrice:103 },
  { code:"J", n:"炸魚塔塔醬", comboPrice:147, singlePrice:103 },
  { code:"K", n:"泡菜燒肉", comboPrice:147, singlePrice:103 },
  { code:"L", n:"卡拉雞", comboPrice:153, singlePrice:109 },
  { code:"M", n:"日式豬排", comboPrice:157, singlePrice:113 },
  { code:"O", n:"蒜味蝦蝦飯", comboPrice:213, singlePrice:169 },
  { code:"P", n:"奶油蝦蝦飯", comboPrice:223, singlePrice:179 }
];
const COMBO_DRINKS = [
  { n:"原味紅茶", extra:0, p:30 }, { n:"無糖豆漿", extra:0, p:35 }, { n:"黑糖豆漿", extra:0, p:35 },
  { n:"紅茶豆漿", extra:0, p:35 }, { n:"蜂蜜檸檬", extra:0, p:35 }, { n:"黑芝麻豆漿", extra:5, p:40 }, { n:"日式奶茶", extra:5, p:40 }
];
const COMBO_SIDES = [
  { n:"咖哩可樂餅", extra:0, p:35 }, { n:"海苔醬薯條", extra:0, p:43 }, { n:"蜂蜜芥末薯條", extra:0, p:43 },
  { n:"酥炸菇", extra:0, p:43 }, { n:"酥炸蝦頭", extra:0, p:43 }, { n:"洋蔥圈", extra:6, p:49 },
  { n:"黃金雞塊", extra:6, p:49 }, { n:"日式炸雞", extra:16, p:59 }, { n:"炸魚薯條", extra:26, p:69 }
];
const COMBO_ADDONS = [ { n:"換素餐肉", p:10 }, { n:"加起司", p:10 }, { n:"加玉子燒", p:15 }, { n:"加炸蝦", p:35 } ];

/* --- 狀態變數 --- */
let basket = [];
let orderMode = "combo";
let curCombo = { main: null, drink: null, side: null, addons: [] };
let singleSelection = {}; // 品項名: 數量

/* --- 基礎功能 --- */
function showToast(m) {
  const t = document.getElementById("toast");
  t.innerText = m; t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2500);
}

function setOrderMode(m) {
  orderMode = m;
  document.getElementById("modeComboBtn").classList.toggle("active", m==='combo');
  document.getElementById("modeSingleBtn").classList.toggle("active", m==='single');
  document.getElementById("comboModeWrap").style.display = m==='combo'?'block':'none';
  document.getElementById("singleModeWrap").style.display = m==='single'?'block':'none';
}

/* --- 套餐邏輯 --- */
function renderComboUI() {
  document.getElementById("mainGrid").innerHTML = COMBO_MAINS.map(m => `
    <div class="menu-card ${curCombo.main?.code===m.code?'active':''}" onclick="selectMain('${m.code}')">
      <b>${m.code}. ${m.n}</b><br><small>套餐 $${m.comboPrice}</small>
    </div>
  `).join("");

  document.getElementById("addonGrid").innerHTML = COMBO_ADDONS.map(a => `
    <div class="menu-card ${curCombo.addons.some(x=>x.n===a.n)?'active':''}" onclick="toggleAddon('${a.n}')">
      ${a.n} +$${a.p}
    </div>
  `).join("");

  document.getElementById("drinkGrid").innerHTML = COMBO_DRINKS.map(d => `
    <div class="menu-card ${curCombo.drink?.n===d.n?'active':''}" onclick="selectDrink('${d.n}')">
      ${d.n} ${d.extra>0?'+$'+d.extra:''}
    </div>
  `).join("");

  document.getElementById("sideGrid").innerHTML = COMBO_SIDES.map(s => `
    <div class="menu-card ${curCombo.side?.n===s.n?'active':''}" onclick="selectSide('${s.n}')">
      ${s.n} ${s.extra>0?'+$'+s.extra:''}
    </div>
  `).join("");
}

function selectMain(c) {
  curCombo.main = COMBO_MAINS.find(x=>x.code===c);
  document.getElementById("addonStep").classList.remove("step-lock");
  document.getElementById("drinkStep").classList.remove("step-lock");
  document.getElementById("stepMainChip").innerText = "已選";
  document.getElementById("stepMainChip").className = "step-chip ok";
  renderComboUI();
}

function toggleAddon(n) {
  const a = COMBO_ADDONS.find(x=>x.n===n);
  const idx = curCombo.addons.findIndex(x=>x.n===n);
  if(idx>-1) curCombo.addons.splice(idx,1); else curCombo.addons.push(a);
  renderComboUI();
}

function selectDrink(n) {
  curCombo.drink = COMBO_DRINKS.find(x=>x.n===n);
  document.getElementById("sideStep").classList.remove("step-lock");
  document.getElementById("stepDrinkChip").innerText = "已選";
  document.getElementById("stepDrinkChip").className = "step-chip ok";
  renderComboUI();
}

function selectSide(n) {
  curCombo.side = COMBO_SIDES.find(x=>x.n===n);
  document.getElementById("stepSideChip").innerText = "已選";
  document.getElementById("stepSideChip").className = "step-chip ok";
  renderComboUI();
}

function resetCombo() {
  curCombo = { main: null, drink: null, side: null, addons: [] };
  document.getElementById("stepMainChip").innerText="進行中"; document.getElementById("stepMainChip").className="step-chip";
  document.getElementById("stepDrinkChip").innerText="未開始"; document.getElementById("stepDrinkChip").className="step-chip";
  document.getElementById("stepSideChip").innerText="未開始"; document.getElementById("stepSideChip").className="step-chip";
  ["addonStep","drinkStep","sideStep"].forEach(id => document.getElementById(id).classList.add("step-lock"));
  renderComboUI();
}

/* --- 單點邏輯 --- */
function renderSingleUI() {
  const categories = [
    { name: "飯糰單點", list: COMBO_MAINS.map(m=>({n:m.n, p:m.singlePrice})) },
    { name: "飲品單點", list: COMBO_DRINKS.map(d=>({n:d.n, p:d.p})) },
    { name: "副餐單點", list: COMBO_SIDES.map(s=>({n:s.n, p:s.p})) }
  ];
  document.getElementById("singleMenuWrap").innerHTML = categories.map(cat => `
    <div class="combo-step">
      <div class="brand-title" style="font-size:18px; margin-bottom:10px;">${cat.name}</div>
      <div class="grid">
        ${cat.list.map(i => `
          <div class="menu-card">
            <b>${i.n}</b><br>$${i.p}
            <div style="display:flex; align-items:center; gap:10px; margin-top:10px;">
              <button class="btn" style="padding:5px 10px;" onclick="changeSingle('${i.n}', -1, ${i.p})">-</button>
              <b id="single-qty-${i.n}">${singleSelection[i.n]?.q || 0}</b>
              <button class="btn" style="padding:5px 10px;" onclick="changeSingle('${i.n}', 1, ${i.p})">+</button>
            </div>
          </div>
        `).join("")}
      </div>
    </div>
  `).join("");
}

function changeSingle(n, d, p) {
  if(!singleSelection[n]) singleSelection[n] = { q:0, p:p };
  singleSelection[n].q += d;
  if(singleSelection[n].q <= 0) delete singleSelection[n];
  document.getElementById(`single-qty-${n}`).innerText = singleSelection[n]?.q || 0;
}

/* --- 購物車核心 --- */
function addToBasket() {
  if (orderMode === "combo") {
    if(!curCombo.main || !curCombo.drink || !curCombo.side) return alert("請完成套餐步驟選擇！");
    const addonP = curCombo.addons.reduce((s,a)=>s+a.p, 0);
    const total = curCombo.main.comboPrice + curCombo.drink.extra + curCombo.side.extra + addonP;
    const desc = `套餐:${curCombo.main.n}(配:${curCombo.drink.n}/${curCombo.side.n}${curCombo.addons.length?',加:'+curCombo.addons.map(a=>a.n).join('|'):''})`;
    basket.push({ desc, price: total });
    resetCombo();
  } else {
    const keys = Object.keys(singleSelection);
    if(keys.length===0) return alert("請先選擇單點品項數量！");
    keys.forEach(k => {
      basket.push({ desc: `單點:${k} x ${singleSelection[k].q}`, price: singleSelection[k].p * singleSelection[k].q });
    });
    singleSelection = {};
    renderSingleUI();
  }
  showToast("已加入購物車");
  updateBasketUI();
}

function updateBasketUI() {
  const list = document.getElementById("basketItemsList");
  const totalTop = document.getElementById("cartTotalTop");
  const totalIn = document.getElementById("inlineSummaryTotal");
  const btn = document.getElementById("goCheckoutBtn");

  if(basket.length===0){
    list.innerText = "尚未加入餐點";
    totalTop.innerText = "0"; totalIn.innerText = "0"; btn.disabled = true;
    return;
  }
  let sum = 0;
  list.innerHTML = basket.map((item, i) => {
    sum += item.price;
    return `
      <div class="cart-item-box">
        <span class="del-btn" onclick="removeItem(${i})">✕</span>
        <b>${item.desc}</b><br>$${item.price}
      </div>
    `;
  }).join("");
  totalTop.innerText = sum; totalIn.innerText = sum; btn.disabled = false;
}

function removeItem(i) { basket.splice(i,1); updateBasketUI(); }

/* --- 結帳與時間邏輯 (恢復 v12.0.0) --- */
function handlePickupModeChange() {
  const mode = document.getElementById("pickupMode").value;
  const payS = document.getElementById("payMethod");
  const resF = document.getElementById("reserveFields");
  if(mode==='onsite') {
    resF.style.display='none';
    payS.innerHTML = `<option value="LINEPAY">LINE Pay</option><option value="現金">現場付款</option>`;
  } else {
    resF.style.display='block';
    payS.innerHTML = `<option value="LINEPAY">LINE Pay (預約僅限支付)</option>`;
    initDateOptions();
  }
}

function initDateOptions() {
  const s = document.getElementById("pickupDate");
  const now = getTaipeiNow();
  s.innerHTML = [0,1,2].map(i => {
    const d = new Date(now.getTime() + i*24*60*60*1000);
    const label = i===0?'今天':(i===1?'明天':'後天');
    const val = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    return `<option value="${val}">${label} (${val})</option>`;
  }).join("");
  updatePickupTimeOptions();
}

function updatePickupTimeOptions() {
  const dateStr = document.getElementById("pickupDate").value;
  const s = document.getElementById("pickupTime");
  const now = getTaipeiNow();
  const minT = new Date(now.getTime() + MIN_RESERVE_MINUTES*60000);
  
  let options = [];
  let cur = new Date(dateStr + "T10:30:00");
  const end = new Date(dateStr + "T19:00:00");
  
  while(cur <= end) {
    if(cur >= minT) options.push(pad(cur.getHours())+":"+pad(cur.getMinutes()));
    cur = new Date(cur.getTime() + 30*60000);
  }
  s.innerHTML = options.length ? options.map(t=>`<option value="${t}">${t}</option>`).join("") : `<option value="">無可用時段</option>`;
}

function getTaipeiNow() { return new Date(new Date().toLocaleString("en-US", {timeZone:"Asia/Taipei"})); }
function pad(n) { return String(n).padStart(2,'0'); }

function showCheckout() {
  document.getElementById("checkoutPanel").style.display = "block";
  document.getElementById("checkoutItemsDisplay").innerHTML = basket.map(i=>`• ${i.desc} ($${i.price})`).join("<br>");
  window.scrollTo({top: document.body.scrollHeight, behavior:'smooth'});
}
function hideCheckout() { document.getElementById("checkoutPanel").style.display = "none"; }

async function submitOrder() {
  const name = document.getElementById("customerName").value.trim();
  const phone = document.getElementById("customerPhone").value.trim();
  if(!name || !phone) return alert("請填寫姓名與電話！");

  const btn = document.getElementById("submitBtn");
  btn.disabled = true; btn.innerText = "送出中...";

  const mode = document.getElementById("pickupMode").value;
  let pickup = "現場取餐";
  if(mode==='reserve') {
    const t = document.getElementById("pickupTime").value;
    if(!t) return alert("請選擇預約時間！");
    pickup = document.getElementById("pickupDate").value + " " + t;
  }

  const orderData = {
    items: basket.map(i=>i.desc).join(" | "),
    total: basket.reduce((s,i)=>s+i.price, 0),
    pickupTime: pickup,
    payMethod: document.getElementById("payMethod").value,
    customerName: name, customerPhone: phone
  };

  try {
    const res = await fetch(GAS_API + "?action=submitOrder&orderData=" + JSON.stringify(orderData));
    const json = await res.json();
    if(json.payUrl) {
      location.href = json.payUrl;
    } else if(json.status === "success") {
      document.getElementById("orderPage").style.display='none';
      document.getElementById("successPage").style.display='block';
      document.getElementById("successDetail").innerHTML = `取餐號：<b>${json.seq}</b><br>訂單ID：${json.orderId}`;
    }
  } catch(e) { alert("系統錯誤，請稍後再試"); btn.disabled=false; }
}

/* --- 查詢功能 --- */
function openQueryModal() { document.getElementById("queryModal").classList.add("show"); }
function closeQueryModal() { document.getElementById("queryModal").classList.remove("show"); }
async function queryOrder() {
  const id = document.getElementById("queryInput").value;
  const resDiv = document.getElementById("queryResult");
  resDiv.innerHTML = "查詢中...";
  try {
    const res = await fetch(GAS_API + "?action=checkMyOrder&id=" + id);
    const json = await res.json();
    if(!json) resDiv.innerHTML = "查無訂單";
    else resDiv.innerHTML = `<div style="padding:10px; background:#f0f0f0; border-radius:10px;">
      狀態：${json.status}<br>取餐號：${json.seqId}<br>內容：${json.items}</div>`;
  } catch(e) { resDiv.innerHTML = "查詢失敗"; }
}

renderComboUI();
renderSingleUI();
</script>
